<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Day</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231c1a17'/><text y='.85em' font-size='65' x='18' fill='white' font-family='sans-serif' font-weight='bold'>✓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #eeebe4;
    --surface:    #f7f5f1;
    --surface-2:  #eae7e0;
    --border:     #dedad2;
    --text:       #1A2028;
    --text-2:     #5f6570;
    --text-3:     #a09890;
    --accent:     #1A2028;
    --done-green: #2d6a4f;
    --high:       #b91c1c;
    --mid:        #a16207;
    --low:        #2d6a4f;
    --radius:     16px;
    --radius-sm:  9px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 3rem 1rem 5rem;
  }

  .container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.25rem 1.75rem 1.5rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 4px 24px rgba(26,32,40,0.07);
  }

  .header {
    margin-bottom: 2rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .header .date {
    font-size: 0.78rem;
    color: var(--text-3);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .clock-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
    width: fit-content;
  }
  .clock-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .seconds-bar-track {
    width: 100%;
    height: 1px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .seconds-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--text-3);
    border-radius: 99px;
    transition: width 0.95s linear;
  }

  .sound-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text-3);
    transition: all 0.15s;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .sound-btn:hover { border-color: var(--text-2); color: var(--text-2); }
  .sound-btn.muted { opacity: 0.4; }

  .input-wrap {
    position: relative;
    margin-bottom: 0.7rem;
  }
  .input-wrap input[type="text"] {
    width: 100%;
    padding: 13px 52px 13px 16px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,32,40,0.08);
  }
  .input-wrap input[type="text"]::placeholder { color: var(--text-3); }

  .add-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.15s;
  }
  .add-btn:hover { opacity: 0.75; }
  .add-btn:active { transform: translateY(-50%) scale(0.9); }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 1.5rem;
  }
  .priority-btn {
    padding: 5px 13px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .priority-btn.active-low  { border-color: var(--low);  color: var(--low);  background: #d8f3dc55; }
  .priority-btn.active-mid  { border-color: var(--mid);  color: var(--mid);  background: #fef3c755; }
  .priority-btn.active-high { border-color: var(--high); color: var(--high); background: #fee2e255; }

  .time-pill {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .time-pill label {
    font-size: 0.7rem;
    color: var(--text-3);
    font-family: 'IBM Plex Mono', monospace;
  }
  input[type="time"] {
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 8px;
    padding: 4px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-2);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="time"]:focus { border-color: var(--accent); }

  .kbd-strip { display: none; }

  .divider { height: 1px; background: var(--border); margin-bottom: 0.5rem; }

  .filters { display: flex; gap: 0; margin-bottom: 0.25rem; }
  .filter-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .filter-btn:hover { color: var(--text-2); }
  .filter-btn.active {
    color: var(--text);
    font-weight: 700;
    border-bottom-color: var(--text);
  }

  ul {
    list-style: none;
    max-height: calc(100vh - 480px);
    min-height: 60px;
    overflow-y: auto;
    margin-top: 0.25rem;
  }
  ul::-webkit-scrollbar { width: 0; }

  li {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    animation: fadeUp 0.2s ease both;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  li:last-child { border-bottom: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  li.completing {
    opacity: 0 !important;
    transform: translateX(8px) !important;
  }

  li.done { opacity: 0.45; }
  li.done .task-text { text-decoration: line-through; color: var(--text-3); }
  li[data-p="low"].done .check-circle  { background: var(--done-green); border-color: var(--done-green); }
  li[data-p="mid"].done .check-circle  { background: var(--mid);        border-color: var(--mid);        }
  li[data-p="high"].done .check-circle { background: var(--high);       border-color: var(--high);       }
  li.done .check-circle::after {
    opacity: 1;
    transform: translate(-50%, -62%) rotate(45deg) scale(1);
  }

  .check-circle {
    width: 19px;
    height: 19px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
  }
  .check-circle::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 8px;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: translate(-50%, -62%) rotate(45deg) scale(0);
    opacity: 0;
    transition: opacity 0.18s cubic-bezier(.34,1.56,.64,1),
                transform 0.18s cubic-bezier(.34,1.56,.64,1);
  }

  .p-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .p-dot.high { background: var(--high); }
  .p-dot.mid  { background: var(--mid);  }
  .p-dot.low  { background: var(--low);  }

  .task-text {
    flex: 1;
    font-size: 0.91rem;
    font-weight: 500;
    word-break: break-word;
    line-height: 1.4;
    color: var(--text);
    transition: color 0.2s;
  }

  .task-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.66rem;
    color: var(--text-3);
    flex-shrink: 0;
  }

  .delete-btn {
    background: transparent;
    color: var(--text-3);
    border: none;
    width: 22px;
    height: 22px;
    font-size: 0.72rem;
    cursor: pointer;
    flex-shrink: 0;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }
  li:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: #fee2e2; color: var(--high); }

  .empty-state {
    padding: 2.5rem 0 1.5rem;
    color: var(--text-3);
    font-size: 0.82rem;
    text-align: center;
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .task-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-3);
  }
  .footer-actions { display: flex; gap: 5px; }
  .ghost-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 5px 11px;
    border-radius: var(--radius-sm);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ghost-btn:hover { background: var(--surface-2); }
  .ghost-btn.active { background: var(--text); color: #f7f5f1; border-color: var(--text); }
  .ghost-btn.danger:hover { background: #fee2e2; border-color: var(--high); color: var(--high); }
  #clear-btn { display: none; }
  #clear-btn.visible { display: block; }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--text);
    color: #f7f5f1;
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 0.82rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-undo {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 3px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
  }
  .toast-undo:hover { background: rgba(255,255,255,0.1); }

  .confetti-ring {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 998;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .confetti-ring.show { opacity: 1; }
  .confetti-ring svg { width: 320px; height: 320px; }

  .rainbow-river {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    overflow: hidden;
  }
  .rainbow-river.show { animation: riverFade 3s ease forwards; }
  @keyframes riverFade {
    0%   { opacity: 0; }
    8%   { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── Illustrated characters ──────────────────────────────────────────────── */
  .celebration-character {
    position: fixed;
    pointer-events: none;
    z-index: 10000;
    opacity: 0;
    transform: translateY(30px) scale(0.7);
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.18));
    animation: charRise 3s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes charRise {
    0%   { opacity: 0;    transform: translateY(40px) scale(0.65) rotate(-4deg); }
    12%  { opacity: 1;    transform: translateY(-8px) scale(1.05) rotate(2deg);  }
    22%  { opacity: 1;    transform: translateY(0px)  scale(1)    rotate(0deg);  }
    75%  { opacity: 1;    transform: translateY(-6px) scale(1)    rotate(-1deg); }
    100% { opacity: 0;    transform: translateY(-30px) scale(0.9) rotate(3deg);  }
  }
  /* Each character gets a slight wobble offset */
  .celebration-character:nth-child(1) { animation-delay: 0.00s; }
  .celebration-character:nth-child(2) { animation-delay: 0.12s; }
  .celebration-character:nth-child(3) { animation-delay: 0.22s; }
  .celebration-character:nth-child(4) { animation-delay: 0.32s; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>My Day</h1>
      <div class="date" id="date-display"></div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:8px;">
      <button class="sound-btn" id="sound-btn" onclick="toggleSound()" title="Toggle sound">🔊</button>
      <div class="clock-block">
        <div class="clock-time" id="clock-time"></div>
        <div class="seconds-bar-track">
          <div class="seconds-bar-fill" id="seconds-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-wrap">
    <input type="text" id="task-input" placeholder="Add a task..." maxlength="80" autocomplete="off">
    <button class="add-btn" onclick="addTask()" title="Add (Enter)">+</button>
  </div>

  <div class="toolbar">
    <button class="priority-btn active-low" data-p="low"  onclick="selectPriority('low')">Low</button>
    <button class="priority-btn"            data-p="mid"  onclick="selectPriority('mid')">Mid</button>
    <button class="priority-btn"            data-p="high" onclick="selectPriority('high')">High</button>
    <div class="time-pill">
      <label for="time-input">at</label>
      <input type="time" id="time-input">
    </div>
  </div>

  <div class="kbd-strip">
    <kbd>Enter</kbd> add &nbsp;·&nbsp; <kbd>Alt 1/2/3</kbd> priority
  </div>

  <div class="divider"></div>

  <div class="filters">
    <button class="filter-btn active" data-f="all"    onclick="setFilter('all')">All <span id="cnt-all"></span></button>
    <button class="filter-btn"        data-f="active" onclick="setFilter('active')">Active <span id="cnt-active"></span></button>
    <button class="filter-btn"        data-f="done"   onclick="setFilter('done')">Done <span id="cnt-done"></span></button>
  </div>

  <ul id="task-list"></ul>

  <div class="footer-row">
    <span class="task-counter" id="task-counter"></span>
    <div class="footer-actions">
      <button class="ghost-btn danger" id="clear-btn" onclick="clearDone()">Clear done</button>
      <button class="ghost-btn" id="sort-btn" onclick="toggleSort()">Sort</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">
  Task removed
  <button class="toast-undo" onclick="undoDelete()">Undo</button>
</div>

<div class="confetti-ring" id="confetti-ring"></div>
<div class="rainbow-river" id="rainbow-river">
  <canvas id="rainbow-canvas"></canvas>
</div>

<script>
  // ─── Audio Engine ──────────────────────────────────────────────────────────
  let audioCtx = null;
  let soundEnabled = localStorage.getItem('myDay_sound') !== 'false';

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    localStorage.setItem('myDay_sound', soundEnabled);
    const btn = document.getElementById('sound-btn');
    btn.textContent = soundEnabled ? '🔊' : '🔇';
    btn.classList.toggle('muted', !soundEnabled);
    if (soundEnabled) playPop();
  }

  document.getElementById('sound-btn').textContent = soundEnabled ? '🔊' : '🔇';
  document.getElementById('sound-btn').classList.toggle('muted', !soundEnabled);

  function envelope(gainNode, ctx, { attack = 0.005, sustain = 0.12, release = 0.18, peak = 0.35 } = {}) {
    const t = ctx.currentTime;
    gainNode.gain.setValueAtTime(0, t);
    gainNode.gain.linearRampToValueAtTime(peak, t + attack);
    gainNode.gain.setValueAtTime(peak, t + attack + sustain);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, t + attack + sustain + release);
  }

  function playPop() {
    if (!soundEnabled) return;
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.06);
    osc.connect(gain);
    gain.connect(ctx.destination);
    envelope(gain, ctx, { attack: 0.003, sustain: 0.01, release: 0.06, peak: 0.22 });
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);
    const bufSize = ctx.sampleRate * 0.04;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(0.08, ctx.currentTime);
    nGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.04);
    noise.connect(nGain);
    nGain.connect(ctx.destination);
    noise.start(ctx.currentTime);
  }

  function playDing(isDone) {
    if (!soundEnabled) return;
    const ctx = getCtx();
    const freqs = isDone ? [880, 1320] : [660, 990];
    freqs.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.connect(gain);
      gain.connect(ctx.destination);
      const delay = i * 0.04;
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.28 - i * 0.08, t + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
      osc.start(t);
      osc.stop(t + 0.65);
    });
  }

  function playWhoosh() {
    if (!soundEnabled) return;
    const ctx = getCtx();
    const bufSize = ctx.sampleRate * 0.25;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(1800, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.22);
    filter.Q.value = 1.2;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start(ctx.currentTime);
  }

  function playUndo() {
    if (!soundEnabled) return;
    const ctx = getCtx();
    const bufSize = ctx.sampleRate * 0.22;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(200, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.2);
    filter.Q.value = 1.2;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.16, ctx.currentTime + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
