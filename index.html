<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ফালুদা দৌৰ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231c1a17'/><text y='.85em' font-size='65' x='18' fill='white' font-family='sans-serif' font-weight='bold'>✓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #1a1c1e;
    --surface:    #f7f5f1;
    --surface-2:  #eae7e0;
    --border:     #dedad2;
    --text:       #1A2028;
    --text-2:     #5f6570;
    --text-3:     #a09890;
    --accent:     #1A2028;
    --done-green: #2d6a4f;
    --high:       #b91c1c;
    --mid:        #a16207;
    --low:        #2d6a4f;
    --radius:     16px;
    --radius-sm:  9px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 3rem 1rem 5rem;
  }
  .container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.25rem 1.75rem 1.5rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 4px 24px rgba(26,32,40,0.07);
  }
  .header {
    margin-bottom: 2rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .header .date {
    font-size: 0.78rem;
    color: var(--text-3);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .clock-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
    width: fit-content;
  }
  .clock-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .seconds-bar-track {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .seconds-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--text-3);
    border-radius: 99px;
    transition: width 0.95s linear;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 0.7rem;
  }
  .input-wrap input[type="text"] {
    width: 100%;
    padding: 13px 52px 13px 16px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,32,40,0.08);
  }
  .input-wrap input[type="text"]::placeholder { color: var(--text-3); }
  .add-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 10px;
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(26,32,40,0.12), inset 0 1px 0 rgba(255,255,255,0.5);
    transition: opacity 0.15s, transform 0.15s;
  }
  .add-btn:hover { transform: translateY(-50%) scale(1.06); opacity: 0.9; }
  .add-btn:active { transform: translateY(-50%) scale(0.93); }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 1.5rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 3px;
    width: fit-content;
  }
  .priority-btn {
    padding: 5px 13px;
    border-radius: 99px;
    border: none;
    background: transparent;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  .priority-btn.active-low  { background: var(--low);  color: #fff; box-shadow: 0 2px 8px rgba(45,106,79,0.25); }
  .priority-btn.active-mid  { background: var(--mid);  color: #fff; box-shadow: 0 2px 8px rgba(161,98,7,0.25); }
  .priority-btn.active-high { background: var(--high); color: #fff; box-shadow: 0 2px 8px rgba(185,28,28,0.25); }
  .time-pill { display: none; }
  .kbd-strip  { display: none; }
  input[type="time"] {
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 8px;
    padding: 4px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-2);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="time"]:focus { border-color: var(--accent); }
  .divider { height: 1px; background: var(--border); margin-bottom: 0.5rem; }
  .filters { display: flex; gap: 0; margin-bottom: 0.25rem; }
  .filter-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .filter-btn:hover { color: var(--text-2); }
  .filter-btn.active { color: var(--text); font-weight: 700; border-bottom-color: var(--text); }
  ul {
    list-style: none;
    max-height: calc(100vh - 480px);
    min-height: 60px;
    overflow-y: auto;
    margin-top: 0.25rem;
  }
  ul::-webkit-scrollbar { width: 0; }
  li {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    animation: fadeUp 0.2s ease both;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  li:last-child { border-bottom: none; }
  li:hover { background: var(--surface-2); border-radius: var(--radius-sm); }
  li.drag-over { border-top: 2px solid var(--accent); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  li.completing { opacity: 0 !important; transform: scale(0.95) !important; }
  li.done { opacity: 0.45; }
  li.done .task-text { text-decoration: line-through; color: var(--text-3); }
  li[data-p="low"].done .check-circle  { background: var(--done-green); border-color: var(--done-green); }
  li[data-p="mid"].done .check-circle  { background: var(--mid);        border-color: var(--mid);        }
  li[data-p="high"].done .check-circle { background: var(--high);       border-color: var(--high);       }
  li.done .check-circle::after { opacity: 1; transform: translate(-50%, -62%) rotate(45deg) scale(1); }
  .check-circle {
    width: 19px;
    height: 19px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
  }
  .check-circle::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 8px;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: translate(-50%, -62%) rotate(45deg) scale(0);
    opacity: 0;
    transition: opacity 0.18s cubic-bezier(.34,1.56,.64,1), transform 0.18s cubic-bezier(.34,1.56,.64,1);
  }
  .p-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .p-dot.high { background: var(--high); }
  .p-dot.mid  { background: var(--mid);  }
  .p-dot.low  { background: var(--low);  }
  .task-text {
    flex: 1;
    font-size: 0.91rem;
    font-weight: 500;
    word-break: break-word;
    line-height: 1.4;
    color: var(--text);
    transition: color 0.2s;
  }
  .task-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.66rem;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .delete-btn {
    background: transparent;
    color: var(--text-3);
    border: none;
    width: 22px;
    height: 22px;
    font-size: 0.72rem;
    cursor: pointer;
    flex-shrink: 0;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }
  li:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: #fee2e2; color: var(--high); }
  .empty-state {
    padding: 2.5rem 0 1.5rem;
    color: var(--text-3);
    font-size: 0.82rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .task-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-3);
  }
  .footer-actions {
    display: flex;
    gap: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 3px;
  }
  .ghost-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 5px 11px;
    border-radius: 99px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ghost-btn:hover { background: var(--surface-2); }
  .ghost-btn.active { background: var(--text); color: #f7f5f1; border-color: var(--text); }
  .ghost-btn.danger:hover { background: #fee2e2; border-color: var(--high); color: var(--high); }
  #clear-btn { display: none; }
  #clear-btn.visible { display: block; }
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--text);
    color: #f7f5f1;
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 0.82rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-undo {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 3px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
  }
  .toast-undo:hover { background: rgba(255,255,255,0.1); }
  .footer-credit {
    position: fixed;
    bottom: 1.5rem;
    width: 100%;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: #4a4a4a;
    letter-spacing: 0.02em;
    pointer-events: none;
    z-index: 1;
  }
  .app-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 3px;
    width: fit-content;
  }
  .app-tab {
    padding: 5px 18px;
    border-radius: 99px;
    border: none;
    background: transparent;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  .app-tab.active { background: var(--text); color: #f7f5f1; }
  .notes-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0 0.75rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }
  .notes-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-3);
  }
  .note-card {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    animation: fadeUp 0.2s ease both;
  }
  .note-card:last-child { border-bottom: none; }
  .note-card:hover { background: var(--surface-2); border-radius: var(--radius-sm); }
  .note-card-title {
    font-size: 0.91rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }
  .note-card-preview {
    font-size: 0.76rem;
    color: var(--text-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-card-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-3);
    margin-top: 4px;
  }
  .note-editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0 0.75rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }
  #note-title-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    outline: none;
    margin-bottom: 0.5rem;
    padding: 0;
  }
  #note-title-input::placeholder { color: var(--text-3); }
  #note-body-input {
    width: 100%;
    min-height: 220px;
    border: none;
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    color: var(--text);
    outline: none;
    resize: none;
    line-height: 1.6;
    padding: 0;
  }
  #note-body-input::placeholder { color: var(--text-3); }
</style>
</head>
<body>
<div class="container">
  <div class="app-tabs" style="margin-bottom: 1rem;">
    <button class="app-tab active" onclick="playClick(); switchApp('tasks')">Tasks</button>
    <button class="app-tab"        onclick="playClick(); switchApp('notes')">Notes</button>
  </div>
  <div class="header">
    <div class="header-left">
      <h1>ফালুদা দৌৰ</h1>
      <div class="date" id="date-display"></div>
    </div>
    <div class="clock-block">
      <div class="clock-time" id="clock-time"></div>
      <div class="seconds-bar-track">
        <div class="seconds-bar-fill" id="seconds-bar"></div>
      </div>
    </div>
  </div>
  <div class="input-wrap">
    <input type="text" id="task-input" placeholder="Add a task..." maxlength="80" autocomplete="off">
    <button class="add-btn" onclick="playClick(); addTask()" title="Add (Enter)">+</button>
  </div>
  <div class="toolbar">
    <button class="priority-btn active-low" data-p="low"  onclick="playClick(); selectPriority('low')">Low</button>
    <button class="priority-btn"            data-p="mid"  onclick="playClick(); selectPriority('mid')">Mid</button>
    <button class="priority-btn"            data-p="high" onclick="playClick(); selectPriority('high')">High</button>
    <div class="time-pill">
      <label for="time-input">at</label>
      <input type="time" id="time-input">
    </div>
  </div>
  <div class="kbd-strip">
    <kbd>Enter</kbd> add &nbsp;&#183;&nbsp; <kbd>Alt 1/2/3</kbd> priority
  </div>
  <div id="tasks-view">
    <div class="divider"></div>
    <div class="filters">
      <button class="filter-btn active" data-f="all"    onclick="playClick(); setFilter('all')">All <span id="cnt-all"></span></button>
      <button class="filter-btn"        data-f="active" onclick="playClick(); setFilter('active')">Active <span id="cnt-active"></span></button>
      <button class="filter-btn"        data-f="done"   onclick="playClick(); setFilter('done')">Done <span id="cnt-done"></span></button>
    </div>
    <ul id="task-list"></ul>
  </div>
  <div id="notes-view" style="display:none;">
<div id="notes-list-view">
      <div class="input-wrap" style="margin-bottom: 0.75rem;">
        <button style="width:100%; padding: 13px 16px; border-radius: var(--radius); border: 1.5px solid var(--border); background: #fff; font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; color: var(--text-3); text-align: left; cursor: pointer;" onclick="playClick(); newNote()">+ New note...</button>
      </div>
      <div class="notes-toolbar">
        <span class="notes-count" id="notes-count"></span>
      </div>
      <div id="notes-list"></div>
    </div>
    <div id="note-editor-view" style="display:none;">
      <div class="note-editor-header">
        <button class="ghost-btn" onclick="playClick(); closeEditor()">← Back</button>
        <button class="ghost-btn danger" onclick="playClick(); deleteCurrentNote()">Delete</button>
      </div>
      <input type="text" id="note-title-input" placeholder="Note title..." maxlength="60" autocomplete="off">
      <textarea id="note-body-input" placeholder="Start writing..."></textarea>
    </div>
  </div>
  <div class="footer-row">
    <span class="task-counter" id="task-counter"></span>
    <div class="footer-actions">
      <button class="ghost-btn danger" id="clear-btn" onclick="playClick(); clearDone()">Clear done</button>
      <button class="ghost-btn" id="sort-btn" onclick="playClick(); toggleSort()">Sort</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">
  Task removed
  <button class="toast-undo" onclick="undoDelete()">Undo</button>
</div>

  function playClick() {
    const a = new Audio(CLICK_SRC);
    a.volume = 0.6;
    a.play().catch(function(){});
  }
  // ── App state ───────────────────────────────────────────────────────────
  var tasks            = JSON.parse(localStorage.getItem('myDay_tasks') || '[]');
  var selectedPriority = 'low';
  var activeFilter     = 'all';
  var sortByPriority   = false;
  var deletedTask      = null;
  var deletedIndex     = null;
  var toastTimer       = null;
  var priorityOrder    = { high: 0, mid: 1, low: 2 };
  var dragSrcId        = null;
  function save() { localStorage.setItem('myDay_tasks', JSON.stringify(tasks)); }
  function selectPriority(p) {
    selectedPriority = p;
    document.querySelectorAll('.priority-btn').forEach(function(btn) {
      btn.className = 'priority-btn';
      if (btn.dataset.p === p) btn.classList.add('active-' + p);
    });
  }
  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.f === f);
    });
    render();
  }
  function toggleSort() {
    sortByPriority = !sortByPriority;
    document.getElementById('sort-btn').classList.toggle('active', sortByPriority);
    render();
  }
  function addTask() {
    var input     = document.getElementById('task-input');
    var timeInput = document.getElementById('time-input');
    var text      = input.value.trim();
    if (!text) return;
    tasks.push({ text: text, priority: selectedPriority, done: false, id: Date.now(), time: timeInput.value || null });
    input.value = '';
    timeInput.value = '';
    input.focus();
    save(); render();
  }
  function toggleTask(id) {
    var li = document.querySelector('li[data-id="' + id + '"]');
    if (!li) return;
    playClick();
    li.classList.add('completing');
    setTimeout(function() {
      var t = tasks.find(function(t) { return t.id === id; });
      if (t) {
        t.done = !t.done;
        if (t.done) trackCompletion();
        save(); render();
      }
    }, 200);
  }
  function editTask(id, el) {
    var t = tasks.find(function(t) { return t.id === id; });
    if (!t || t.done) return;
    var prev = t.text;
    el.contentEditable = 'true';
    el.focus();
    var range = document.createRange();
    range.selectNodeContents(el);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    el.style.outline = 'none';
    el.style.borderBottom = '1.5px solid var(--accent)';
    el.style.paddingBottom = '1px';
    function finish(cancel) {
      el.contentEditable = 'false';
      el.style.borderBottom = '';
      el.style.paddingBottom = '';
      var newText = el.textContent.trim();
      if (cancel || !newText) { el.textContent = prev; return; }
      t.text = newText;
      save();
    }
    el.onblur = function() { finish(false); };
    el.onkeydown = function(e) {
      if (e.key === 'Enter') { e.preventDefault(); finish(false); }
      if (e.key === 'Escape') { finish(true); }
    };
  }
  function deleteTask(id, e) {
    e.stopPropagation();
    playClick();
    var idx = tasks.findIndex(function(t) { return t.id === id; });
    if (idx === -1) return;
    deletedTask  = tasks[idx];
    deletedIndex = idx;
    tasks.splice(idx, 1);
    save(); render(); showToast();
  }
  function reorderTask(srcId, targetId) {
    if (srcId === targetId) return;
    var srcIdx    = tasks.findIndex(function(t) { return t.id === srcId; });
    var targetIdx = tasks.findIndex(function(t) { return t.id === targetId; });
    if (srcIdx === -1 || targetIdx === -1) return;
    var moved = tasks.splice(srcIdx, 1)[0];
    tasks.splice(targetIdx, 0, moved);
    save(); render();
  }
  function trackCompletion() {
    var stats = JSON.parse(localStorage.getItem('myDay_stats') || '{}');
    var today = new Date().toISOString().slice(0, 10);
    stats[today] = (stats[today] || 0) + 1;
    localStorage.setItem('myDay_stats', JSON.stringify(stats));
  }

  function getStats() {
    var stats = JSON.parse(localStorage.getItem('myDay_stats') || '{}');
    var today = new Date().toISOString().slice(0, 10);
    var todayCount = stats[today] || 0;
    var total = Object.values(stats).reduce(function(a, b) { return a + b; }, 0);
    var days = Object.keys(stats).length;
    return { today: todayCount, total: total, days: days };
  }
  function undoDelete() {
    if (!deletedTask) return;
    tasks.splice(deletedIndex, 0, deletedTask);
    deletedTask = null;
    save(); render(); hideToast();
  }
  function showToast() {
    clearTimeout(toastTimer);
    document.getElementById('toast').classList.add('show');
    toastTimer = setTimeout(hideToast, 4000);
  }
  function hideToast() { document.getElementById('toast').classList.remove('show'); }
  function clearDone() { tasks = tasks.filter(function(t) { return !t.done; }); save(); render(); }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function render() {
    var list  = document.getElementById('task-list');
    list.innerHTML = '';
    var total  = tasks.length;
    var active = tasks.filter(function(t) { return !t.done; }).length;
    var done   = tasks.filter(function(t) { return t.done; }).length;
    document.getElementById('cnt-all').textContent    = total  ? '(' + total  + ')' : '';
    document.getElementById('cnt-active').textContent = active ? '(' + active + ')' : '';
    document.getElementById('cnt-done').textContent   = done   ? '(' + done   + ')' : '';
    document.getElementById('task-counter').textContent =
      total === 0 ? '' : (active + ' of ' + total + ' remaining');
    document.getElementById('clear-btn').classList.toggle('visible', done > 0);
    var visible = tasks.slice();
    if (activeFilter === 'active') visible = visible.filter(function(t) { return !t.done; });
    if (activeFilter === 'done')   visible = visible.filter(function(t) { return t.done; });
    if (sortByPriority) visible.sort(function(a,b) { return priorityOrder[a.priority] - priorityOrder[b.priority]; });
    if (visible.length === 0) {
      var icons = {
        all:    '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><path d="M9 12l2 2 4-4"/></svg>',
        active: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
        done:   '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2 2"/></svg>'
      };
      var msgs = { all: 'No tasks yet.', active: 'All caught up.', done: 'Nothing completed yet.' };
      list.innerHTML = '<div class="empty-state">' + icons[activeFilter] + '<div>' + msgs[activeFilter] + '</div></div>';
      return;
    }
    visible.forEach(function(task) {
      var li      = document.createElement('li');
      li.dataset.id = task.id;
      li.dataset.p  = task.priority;
      if (task.done) li.classList.add('done');
      li.draggable = true;
      li.onclick = function() { toggleTask(task.id); };
      li.ondragstart = function() { li.classList.add('dragging'); dragSrcId = task.id; };
      li.ondragend = function() { li.classList.remove('dragging'); document.querySelectorAll('li.drag-over').forEach(function(el) { el.classList.remove('drag-over'); }); };
      li.ondragover = function(e) { e.preventDefault(); document.querySelectorAll('li.drag-over').forEach(function(el) { el.classList.remove('drag-over'); }); li.classList.add('drag-over'); };
      li.ondrop = function(e) { e.preventDefault(); reorderTask(dragSrcId, task.id); };
      var timeHtml = task.time ? '<span class="task-time">' + task.time + '</span>' : '';
      li.innerHTML =
        '<div class="check-circle"></div>' +
        '<div class="p-dot ' + task.priority + '"></div>' +
        '<span class="task-text" ondblclick="editTask(' + task.id + ',this)">' + esc(task.text) + '</span>' +
        timeHtml +
        '<button class="delete-btn" onclick="deleteTask(' + task.id + ',event)" title="Delete">&#x2715;</button>';
      list.appendChild(li);
    });
    updateStats();
  }
  function updateStats() {
    var s = getStats();
    var el = document.getElementById('stats-bar');
    if (!el) return;
    if (s.total === 0) { el.textContent = ''; return; }
    el.textContent = s.today + ' done today · ' + s.total + ' total across ' + s.days + ' day' + (s.days === 1 ? '' : 's');
  }
  function setDate() {
    var d = new Date();
    document.getElementById('date-display').textContent =
      d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement.id === 'task-input') { playClick(); addTask(); }
    if (e.altKey && e.key === '1') { e.preventDefault(); playClick(); selectPriority('low');  }
    if (e.altKey && e.key === '2') { e.preventDefault(); playClick(); selectPriority('mid');  }
    if (e.altKey && e.key === '3') { e.preventDefault(); playClick(); selectPriority('high'); }
  });
  setDate();
  render();
  function updateClock() {
    var now  = new Date();
    var hrs  = now.getHours();
    var h    = String(hrs % 12 || 12).padStart(2, '0');
    var m    = String(now.getMinutes()).padStart(2, '0');
    var secs = now.getSeconds();
    var s    = String(secs).padStart(2, '0');
    var ampm = hrs >= 12 ? 'PM' : 'AM';
    document.getElementById('clock-time').textContent = h + ':' + m + ':' + s + ' ' + ampm;
    document.getElementById('seconds-bar').style.width = ((secs / 60) * 100) + '%';
  }
  updateClock();
  setInterval(updateClock, 1000);
    // ── Notes state ─────────────────────────────────────────────────────────
  var notes = JSON.parse(localStorage.getItem('myDay_notes') || '[]');
  var currentNoteId = null;
  var activeApp = 'tasks';

  function saveNotes() { localStorage.setItem('myDay_notes', JSON.stringify(notes)); }

  function switchApp(app) {
    activeApp = app;
    document.querySelectorAll('.app-tab').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('onclick').includes("'" + app + "'"));
    });
    document.getElementById('tasks-view').style.display = app === 'tasks' ? '' : 'none';
    document.getElementById('notes-view').style.display = app === 'notes' ? '' : 'none';
    document.getElementById('footer-row') && (document.querySelector('.footer-row').style.display = app === 'tasks' ? '' : 'none');
    document.querySelector('.footer-row').style.visibility = app === 'tasks' ? '' : 'hidden';
    document.querySelector('.footer-row').style.height = app === 'tasks' ? '' : '0';
    document.querySelector('.toolbar').style.visibility = app === 'tasks' ? '' : 'hidden';
    document.querySelector('.toolbar').style.height = app === 'tasks' ? '' : '0';
    document.querySelector('.toolbar').style.marginBottom = app === 'tasks' ? '' : '0';
    document.querySelector('.input-wrap').style.visibility = app === 'tasks' ? '' : 'hidden';
    document.querySelector('.input-wrap').style.height = app === 'tasks' ? '' : '0';
    document.querySelector('.input-wrap').style.marginBottom = app === 'tasks' ? '' : '0';
    if (app === 'notes') renderNotes();
  }

  function newNote() {
    var note = { id: Date.now(), title: '', body: '', updated: Date.now() };
    notes.unshift(note);
    saveNotes();
    openNote(note.id);
  }

  function openNote(id) {
    currentNoteId = id;
    var note = notes.find(function(n) { return n.id === id; });
    if (!note) return;
    document.getElementById('note-title-input').value = note.title;
    document.getElementById('note-body-input').value = note.body;
    document.getElementById('notes-list-view').style.display = 'none';
    document.getElementById('note-editor-view').style.display = '';
    document.getElementById('note-title-input').focus();
  }

  function closeEditor() {
    var note = notes.find(function(n) { return n.id === currentNoteId; });
    if (note) {
      note.title = document.getElementById('note-title-input').value.trim();
      note.body  = document.getElementById('note-body-input').value.trim();
      note.updated = Date.now();
      if (!note.title && !note.body) {
        notes = notes.filter(function(n) { return n.id !== currentNoteId; });
      }
      saveNotes();
    }
    currentNoteId = null;
    document.getElementById('note-editor-view').style.display = 'none';
    document.getElementById('notes-list-view').style.display = '';
    renderNotes();
  }

  function deleteCurrentNote() {
    notes = notes.filter(function(n) { return n.id !== currentNoteId; });
    saveNotes();
    currentNoteId = null;
    document.getElementById('note-editor-view').style.display = 'none';
    document.getElementById('notes-list-view').style.display = '';
    renderNotes();
  }

  function renderNotes() {
    var list = document.getElementById('notes-list');
    var count = document.getElementById('notes-count');
    count.textContent = notes.length ? notes.length + ' note' + (notes.length === 1 ? '' : 's') : '';
    if (notes.length === 0) {
      list.innerHTML = '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><div>No notes yet.</div></div>';
      return;
    }
    list.innerHTML = '';
    notes.forEach(function(note) {
      var card = document.createElement('div');
      card.className = 'note-card';
      card.onclick = function() { playClick(); openNote(note.id); };
      var d = new Date(note.updated);
      var dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      card.innerHTML =
        '<div class="note-card-title">' + esc(note.title || 'Untitled') + '</div>' +
        '<div class="note-card-preview">' + esc(note.body || 'No content') + '</div>' +
        '<div class="note-card-date">' + dateStr + '</div>';
      list.appendChild(card);
    });
  }
</script>

    font-family:'IBM Plex Mono',monospace;

    position:fixed;
    bottom:0.25rem;
    width:100%;
    pointer-events:none;
    z-index:1;
  "></div>
