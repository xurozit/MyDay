<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Day</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231c1a17'/><text y='.85em' font-size='65' x='18' fill='white' font-family='sans-serif' font-weight='bold'>✓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #eeebe4;
    --surface:    #f7f5f1;
    --surface-2:  #eae7e0;
    --border:     #dedad2;
    --text:       #1A2028;
    --text-2:     #5f6570;
    --text-3:     #a09890;
    --accent:     #1A2028;
    --done-green: #2d6a4f;
    --high:       #b91c1c;
    --mid:        #a16207;
    --low:        #2d6a4f;
    --radius:     16px;
    --radius-sm:  9px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Screen-reader only utility */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 3rem 1rem 5rem;
  }

  .container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.25rem 1.75rem 1.5rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 4px 24px rgba(26,32,40,0.07);
  }

  /* Header */
  .header {
    margin-bottom: 2rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .header .date {
    font-size: 0.78rem;
    color: var(--text-3);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Clock */
  .clock-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
  }
  .clock-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .seconds-bar-track {
    width: 100%;
    height: 1px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .seconds-bar-fill {
    height: 100%;
    background: var(--text-3);
    border-radius: 99px;
    transition: width 0.95s linear;
  }

  /* Input */
  .input-label {
    display: block;
    font-size: 0.72rem;
    color: var(--text-3);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 5px;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 0.7rem;
  }
  .input-wrap input[type="text"] {
    width: 100%;
    padding: 13px 52px 13px 16px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,32,40,0.08);
  }
  .input-wrap input[type="text"]::placeholder { color: var(--text-3); }

  .add-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 34px;
    height: 34px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.15s;
  }
  .add-btn:hover { opacity: 0.75; }
  .add-btn:active { transform: translateY(-50%) scale(0.9); }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 1.5rem;
  }
  .priority-btn {
    padding: 5px 13px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .priority-btn.active-low  { border-color: var(--low);  color: var(--low);  background: #d8f3dc55; }
  .priority-btn.active-mid  { border-color: var(--mid);  color: var(--mid);  background: #fef3c755; }
  .priority-btn.active-high { border-color: var(--high); color: var(--high); background: #fee2e255; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin-bottom: 0.5rem; }

  /* Filters */
  .filters {
    display: flex;
    gap: 0;
    margin-bottom: 0.25rem;
    role: tablist;
  }
  .filter-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--text-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .filter-btn:hover { color: var(--text-2); }
  .filter-btn.active {
    color: var(--text);
    font-weight: 700;
    border-bottom-color: var(--text);
  }

  /* Bulk actions */
  .bulk-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    margin-bottom: 4px;
  }
  .bulk-bar.visible { display: flex; }
  .bulk-count {
    font-size: 0.72rem;
    color: var(--text-2);
    font-family: 'IBM Plex Mono', monospace;
    flex: 1;
  }
  .bulk-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .bulk-btn:hover { background: var(--surface-2); }
  .bulk-btn.danger:hover { background: #fee2e2; border-color: var(--high); color: var(--high); }

  /* Task list */
  ul {
    list-style: none;
    max-height: 45dvh;
    min-height: 60px;
    overflow-y: auto;
    margin-top: 0.25rem;
  }
  ul::-webkit-scrollbar { width: 0; }

  li {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.2s ease both;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  li:last-child { border-bottom: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  li.completing {
    opacity: 0 !important;
    transform: translateX(8px) !important;
  }

  li.done { opacity: 0.45; }
  li.done .task-text { text-decoration: line-through; color: var(--text-3); }
  li[data-p="low"].done .check-circle  { background: var(--done-green); border-color: var(--done-green); }
  li[data-p="mid"].done .check-circle  { background: var(--mid);        border-color: var(--mid);        }
  li[data-p="high"].done .check-circle { background: var(--high);       border-color: var(--high);       }
  li.done .check-circle::after {
    opacity: 1;
    transform: translate(-50%, -62%) rotate(45deg) scale(1);
  }

  li.selected { background: rgba(26,32,40,0.03); border-radius: 8px; }

  /* Drag-and-drop */
  li.dragging { opacity: 0.4; }
  li.drag-over { border-top: 2px solid var(--accent); }

  /* Check circle */
  .check-circle {
    width: 19px;
    height: 19px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .check-circle::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 8px;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: translate(-50%, -62%) rotate(45deg) scale(0);
    opacity: 0;
    transition: opacity 0.18s cubic-bezier(.34,1.56,.64,1),
                transform 0.18s cubic-bezier(.34,1.56,.64,1);
  }

  /* Priority badge (replaces color-only dot) */
  .p-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
    flex-shrink: 0;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .p-badge.high { background: #fee2e2; color: var(--high); }
  .p-badge.mid  { background: #fef3c7; color: var(--mid); }
  .p-badge.low  { background: #d8f3dc; color: var(--low); }

  .task-body {
    flex: 1;
    min-width: 0;
  }
  .task-text {
    font-size: 0.91rem;
    font-weight: 500;
    word-break: break-word;
    line-height: 1.4;
    color: var(--text);
    transition: color 0.2s;
  }
  .task-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.63rem;
    color: var(--text-3);
    margin-top: 2px;
  }

  /* Select checkbox (bulk mode) */
  .select-box {
    width: 15px;
    height: 15px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    display: none;
  }
  .select-box.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .select-box.checked::after {
    content: '';
    width: 3px;
    height: 6px;
    border-right: 1.5px solid #fff;
    border-bottom: 1.5px solid #fff;
    transform: rotate(45deg) translateY(-1px);
  }
  .bulk-mode .select-box { display: flex; }

  /* Drag handle */
  .drag-handle {
    cursor: grab;
    color: var(--text-3);
    font-size: 0.7rem;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 0 2px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .drag-handle span {
    display: block;
    width: 10px;
    height: 1.5px;
    background: var(--text-3);
    border-radius: 99px;
  }
  li:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  .delete-btn {
    background: transparent;
    color: var(--text-3);
    border: none;
    width: 22px;
    height: 22px;
    font-size: 0.72rem;
    cursor: pointer;
    flex-shrink: 0;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }
  li:hover .delete-btn,
  li:focus-within .delete-btn { opacity: 1; }
  .delete-btn:hover { background: #fee2e2; color: var(--high); }

  /* Empty state */
  .empty-state {
    padding: 2.5rem 0 1.5rem;
    color: var(--text-3);
    font-size: 0.82rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .empty-icon {
    width: 36px;
    height: 36px;
    opacity: 0.25;
  }

  /* Footer */
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .task-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-3);
  }
  .footer-actions { display: flex; gap: 5px; }
  .ghost-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 5px 11px;
    border-radius: var(--radius-sm);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ghost-btn:hover { background: var(--surface-2); }
  .ghost-btn.active { background: var(--text); color: #f7f5f1; border-color: var(--text); }
  .ghost-btn.danger:hover { background: #fee2e2; border-color: var(--high); color: var(--high); }
  #clear-btn { display: none; }
  #clear-btn.visible { display: block; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--text);
    color: #f7f5f1;
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 0.82rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-undo {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 3px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
  }
  .toast-undo:hover { background: rgba(255,255,255,0.1); }

  /* Carry-over banner */
  .carry-banner {
    display: none;
    align-items: center;
    gap: 8px;
    background: #fef3c7;
    border: 1px solid #fcd34d;
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    margin-bottom: 10px;
    font-size: 0.72rem;
    color: var(--mid);
    font-family: 'IBM Plex Mono', monospace;
  }
  .carry-banner.visible { display: flex; }
  .carry-yes {
    margin-left: auto;
    background: none;
    border: 1px solid var(--mid);
    color: var(--mid);
    padding: 3px 9px;
    border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    cursor: pointer;
  }
  .carry-no {
    background: none;
    border: none;
    color: var(--text-3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="container" role="main">
  <h2 class="sr-only">My Day — task manager</h2>

  <div class="header">
    <div class="header-left">
      <h1>My Day</h1>
      <div class="date" id="date-display" aria-live="polite"></div>
    </div>
    <div class="clock-block" aria-hidden="true">
      <div class="clock-time" id="clock-time"></div>
      <div class="seconds-bar-track">
        <div class="seconds-bar-fill" id="seconds-bar"></div>
      </div>
    </div>
  </div>

  <!-- Carry-over banner (shown when incomplete tasks exist from a previous day) -->
  <div class="carry-banner" id="carry-banner" role="alert">
    <span id="carry-text"></span>
    <button class="carry-yes" onclick="carryOver()">Carry over</button>
    <button class="carry-no"  onclick="dismissCarry()">Dismiss</button>
  </div>

  <label class="sr-only" for="task-input">New task</label>
  <div class="input-wrap">
    <input type="text" id="task-input" placeholder="Add a task…" maxlength="80" autocomplete="off">
    <button class="add-btn" id="add-btn" aria-label="Add task">+</button>
  </div>

  <div class="toolbar" role="group" aria-label="Priority">
    <button class="priority-btn active-low" data-p="low"  aria-pressed="true"  onclick="selectPriority('low')">Low</button>
    <button class="priority-btn"            data-p="mid"  aria-pressed="false" onclick="selectPriority('mid')">Mid</button>
    <button class="priority-btn"            data-p="high" aria-pressed="false" onclick="selectPriority('high')">High</button>
  </div>

  <div class="divider"></div>

  <div class="filters" role="tablist" aria-label="Filter tasks">
    <button class="filter-btn active" role="tab" aria-selected="true"  data-f="all"    onclick="setFilter('all')">All <span id="cnt-all"></span></button>
    <button class="filter-btn"        role="tab" aria-selected="false" data-f="active" onclick="setFilter('active')">Active <span id="cnt-active"></span></button>
    <button class="filter-btn"        role="tab" aria-selected="false" data-f="done"   onclick="setFilter('done')">Done <span id="cnt-done"></span></button>
  </div>

  <!-- Bulk action bar -->
  <div class="bulk-bar" id="bulk-bar" role="toolbar" aria-label="Bulk actions">
    <span class="bulk-count" id="bulk-count" aria-live="polite"></span>
    <button class="bulk-btn" onclick="bulkDone()" aria-label="Mark selected tasks done">Mark done</button>
    <button class="bulk-btn danger" onclick="bulkDelete()" aria-label="Delete selected tasks">Delete</button>
    <button class="bulk-btn" onclick="exitBulk()" aria-label="Exit bulk selection">Cancel</button>
  </div>

  <ul id="task-list" role="list" aria-label="Tasks" aria-live="polite" aria-relevant="additions removals"></ul>

  <div class="footer-row">
    <span class="task-counter" id="task-counter" aria-live="polite"></span>
    <div class="footer-actions">
      <button class="ghost-btn danger" id="clear-btn" onclick="clearDone()" aria-label="Clear completed tasks">Clear done</button>
      <button class="ghost-btn" id="sort-btn" onclick="toggleSort()" aria-pressed="false" aria-label="Sort by priority">Sort</button>
      <button class="ghost-btn" id="bulk-toggle" onclick="toggleBulk()" aria-pressed="false" aria-label="Toggle bulk selection">Select</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="assertive">
  <span id="toast-msg">Task removed</span>
  <button class="toast-undo" onclick="undoDelete()">Undo</button>
</div>

<script>
  /* ── Storage ── */
  const Storage = (() => {
    function get(key, fallback) {
      try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }
    function set(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }
    return { get, set };
  })();

  /* ── State ── */
  let tasks            = Storage.get('myDay_tasks', []);
  let selectedPriority = 'low';
  let activeFilter     = 'all';
  let sortByPriority   = false;
  let bulkMode         = false;
  let selectedIds      = new Set();
  let deletedTask      = null;
  let deletedIndex     = null;
  let toastTimer       = null;
  let idCounter        = Storage.get('myDay_idCounter', 1);
  let lastSavedDate    = Storage.get('myDay_lastDate', null);

  const priorityOrder  = { high: 0, mid: 1, low: 2 };

  function nextId() { idCounter++; Storage.set('myDay_idCounter', idCounter); return idCounter; }
  function save()   { Storage.set('myDay_tasks', tasks); }

  /* ── Carry-over check ── */
  function checkCarryOver() {
    const today = new Date().toDateString();
    if (lastSavedDate && lastSavedDate !== today) {
      const incomplete = tasks.filter(t => !t.done && !t.carriedOver);
      if (incomplete.length) {
        const banner = document.getElementById('carry-banner');
        document.getElementById('carry-text').textContent =
          `${incomplete.length} incomplete task${incomplete.length > 1 ? 's' : ''} from yesterday`;
        banner.classList.add('visible');
      }
    }
    Storage.set('myDay_lastDate', today);
    lastSavedDate = today;
  }

  function carryOver() {
    tasks.forEach(t => { if (!t.done) t.carriedOver = true; });
    save(); render();
    document.getElementById('carry-banner').classList.remove('visible');
  }
  function dismissCarry() {
    document.getElementById('carry-banner').classList.remove('visible');
  }

  /* ── Priority ── */
  function selectPriority(p) {
    selectedPriority = p;
    document.querySelectorAll('.priority-btn').forEach(btn => {
      btn.className = 'priority-btn';
      const active = btn.dataset.p === p;
      if (active) btn.classList.add('active-' + p);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  /* ── Filter ── */
  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const active = btn.dataset.f === f;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    render();
