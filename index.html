<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Day Mobile</title>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#6b7280;
  --accent:#22c55e;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.app{
  max-width:420px;
  margin:auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:20px;
  font-size:24px;
  font-weight:600;
}

.input{
  display:flex;
  padding:0 16px 16px;
  gap:10px;
}

input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--card);
  color:var(--text);
}

button{
  border:none;
  border-radius:12px;
  padding:14px;
  background:var(--accent);
  color:black;
}

.list{
  flex:1;
  overflow:auto;
}

.task{
  background:var(--card);
  margin:8px 16px;
  padding:14px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:transform .2s, opacity .2s;
}

.task.done{
  opacity:.4;
}

.task span{
  flex:1;
}

.actions{
  display:flex;
  gap:8px;
}

.small{
  background:#1f2937;
  color:white;
  padding:6px 10px;
  font-size:12px;
}

</style>
</head>
<body>

<div class="app">
  <div class="header">My Day</div>

  <div class="input">
    <input id="taskInput" placeholder="Add task" />
    <button onclick="handleAdd()">+</button>
  </div>

  <div class="list" id="list"></div>
</div>

<script>

// ===== STATE =====
let tasks = load();
let activeSwipe = null;

function load(){
  try{return JSON.parse(localStorage.getItem('tasks_mobile'))||[]}
  catch{return[]}
}

function save(){
  localStorage.setItem('tasks_mobile',JSON.stringify(tasks))
}

// ===== LOGIC =====
function createTask(text){
  return{
    id:crypto.randomUUID(),
    text,
    done:false,
    createdAt:Date.now(),
    completedAt:null
  }
}

function addTask(text){
  tasks.unshift(createTask(text))
  save(); render()
}

function toggleTask(id){
  const t=tasks.find(t=>t.id===id)
  if(!t)return
  t.done=!t.done
  t.completedAt=t.done?Date.now():null
  save(); render()
}

function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id)
  save(); render()
}

// ===== SWIPE =====
function attachSwipe(el, task){
  let startX=0

  el.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX
  })

  el.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-startX
    if(dx<0){
      el.style.transform=`translateX(${dx}px)`
    }
  })

  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-startX

    if(dx<-100){
      deleteTask(task.id)
    }else{
      el.style.transform=''
    }
  })
}

// ===== UI =====
function render(){
  const list=document.getElementById('list')
  list.innerHTML=''

  tasks.forEach(task=>{
    const div=document.createElement('div')
    div.className='task'+(task.done?' done':'')

    const span=document.createElement('span')
    span.textContent=task.text
    span.onclick=()=>toggleTask(task.id)

    const actions=document.createElement('div')
    actions.className='actions'

    const edit=document.createElement('button')
    edit.className='small'
    edit.textContent='Edit'
    edit.onclick=()=>{
      const val=prompt('Edit',task.text)
      if(val){task.text=val; save(); render()}
    }

    const del=document.createElement('button')
    del.className='small'
    del.textContent='Del'
    del.onclick=()=>deleteTask(task.id)

    actions.appendChild(edit)
    actions.appendChild(del)

    div.appendChild(span)
    div.appendChild(actions)

    attachSwipe(div,task)

    list.appendChild(div)
  })
}

function handleAdd(){
  const input=document.getElementById('taskInput')
  const val=input.value.trim()
  if(!val)return
  addTask(val)
  input.value=''
}

// ===== INIT =====
render()

</script>

</body>
</html>
