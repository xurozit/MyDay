<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional To-Do List</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }

        .input-group { display: flex; gap: 10px; margin-bottom: 1.5rem; }

        input {
            flex-grow: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        ul { list-style: none; padding: 0; }

        li {
            background: #334155;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .delete-btn { background: #ef4444; padding: 5px 10px; font-size: 12px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Task Manager</h1>
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="todo-list"></ul>
</div>

<script>
    function addTask() {
        const input = document.getElementById('todo-input');
        const list = document.getElementById('todo-list');
        
        if (input.value.trim() === '') return;

        const li = document.createElement('li');
        li.innerHTML = `
            <span>${input.value}</span>
            <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>
        `;
        
        list.appendChild(li);
        input.value = '';
    }

    // Allow "Enter" key to add tasks
    document.getElementById('todo-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addTask();
    });
</script>

</body>
</html>
