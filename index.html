<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Day</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231c1a17'/><text y='.85em' font-size='65' x='18' fill='white' font-family='sans-serif' font-weight='bold'>✓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #eeebe4;
    --surface:    #f7f5f1;
    --surface-2:  #eae7e0;
    --border:     #dedad2;
    --text:       #1A2028;
    --text-2:     #5f6570;
    --text-3:     #a09890;
    --accent:     #1A2028;
    --done-green: #2d6a4f;
    --high:       #b91c1c;
    --mid:        #a16207;
    --low:        #2d6a4f;
    --radius:     16px;
    --radius-sm:  9px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 3rem 1rem 5rem;
  }

  .container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.25rem 1.75rem 1.5rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 4px 24px rgba(26,32,40,0.07);
  }

  /* Header & Clock */
  .header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; }
  .header h1 { font-size: 2rem; font-weight: 700; color: var(--text); letter-spacing: -1.5px; line-height: 1; }
  .header .date { font-size: 0.78rem; color: var(--text-3); margin-top: 6px; font-family: 'IBM Plex Mono', monospace; }
  .clock-block { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; width: fit-content; }
  .clock-time { font-family: 'IBM Plex Mono', monospace; font-size: 0.92rem; font-weight: 500; color: var(--text); letter-spacing: -0.5px; line-height: 1; }
  .seconds-bar-track { width: 100%; height: 1px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .seconds-bar-fill { height: 100%; width: 0%; background: var(--text-3); border-radius: 99px; transition: width 0.95s linear; }

  /* Input Area */
  .input-wrap { position: relative; margin-bottom: 0.7rem; }
  .input-wrap input[type="text"] {
    width: 100%; padding: 13px 52px 13px 16px; border-radius: var(--radius); border: 1.5px solid var(--border);
    background: #fff; font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; outline: none; transition: all 0.2s;
  }
  .input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,32,40,0.08); }
  .add-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px;
    background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 1.25rem; cursor: pointer;
  }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 5px; margin-bottom: 1.5rem; }
  .priority-btn { padding: 5px 13px; border-radius: 99px; border: 1.5px solid var(--border); background: transparent; color: var(--text-3); font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; font-weight: 600; cursor: pointer; }
  .priority-btn.active-low  { border-color: var(--low);  color: var(--low);  background: #d8f3dc55; }
  .priority-btn.active-mid  { border-color: var(--mid);  color: var(--mid);  background: #fef3c755; }
  .priority-btn.active-high { border-color: var(--high); color: var(--high); background: #fee2e255; }
  .time-pill { margin-left: auto; display: flex; align-items: center; gap: 5px; }
  input[type="time"] { border: 1.5px solid var(--border); background: transparent; border-radius: 8px; padding: 4px 8px; font-size: 0.7rem; font-family: 'IBM Plex Mono'; }

  /* Tasks */
  ul { list-style: none; max-height: calc(100vh - 480px); overflow-y: auto; margin-top: 0.25rem; }
  li { display: flex; align-items: center; gap: 11px; padding: 13px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  li.done { opacity: 0.45; }
  li.done .task-text { text-decoration: line-through; }
  
  .check-circle { width: 19px; height: 19px; border-radius: 50%; border: 1.5px solid var(--border); position: relative; flex-shrink: 0; }
  li.done .check-circle { background: var(--text); border-color: var(--text); }
  li.done .check-circle::after { content: '✓'; color: white; font-size: 10px; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }

  .p-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .p-dot.high { background: var(--high); }
  .p-dot.mid  { background: var(--mid); }
  .p-dot.low  { background: var(--low); }

  .task-text { flex: 1; font-size: 0.91rem; font-weight: 500; color: var(--text); }
  .edit-input { flex: 1; font-family: inherit; font-size: 0.91rem; padding: 2px 4px; border: 1px solid var(--accent); border-radius: 4px; outline: none; }
  
  .delete-btn { background: transparent; color: var(--text-3); border: none; width: 22px; height: 22px; cursor: pointer; opacity: 0; transition: 0.15s; }
  li:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--high); }

  .kbd-strip { font-size: 0.64rem; color: var(--text-3); font-family: 'IBM Plex Mono'; margin-bottom: 1.25rem; }
  kbd { background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; }

  /* Filters */
  .filters { display: flex; margin-bottom: 0.25rem; }
  .filter-btn { flex: 1; padding: 8px 0; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--text-3); cursor: pointer; font-family: 'JetBrains Mono'; font-size: 0.78rem; }
  .filter-btn.active { color: var(--text); font-weight: 700; border-bottom-color: var(--text); }

  .footer-row { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .task-counter { font-family: 'IBM Plex Mono'; font-size: 0.7rem; color: var(--text-3); }
  .ghost-btn { background: none; border: 1px solid var(--border); color: var(--text-2); padding: 5px 11px; border-radius: var(--radius-sm); font-size: 0.72rem; cursor: pointer; font-weight: 600; }
  .ghost-btn.active { background: var(--text); color: white; }

  /* Toast */
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text); color: #fff; padding: 10px 16px; border-radius: var(--radius); font-size: 0.82rem; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); z-index: 999; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-undo { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; margin-left: 10px; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>My Day</h1>
      <div class="date" id="date-display"></div>
    </div>
    <div class="clock-block">
      <div class="clock-time" id="clock-time"></div>
      <div class="seconds-bar-track"><div class="seconds-bar-fill" id="seconds-bar"></div></div>
    </div>
  </div>

  <div class="input-wrap">
    <input type="text" id="task-input" placeholder="Add a task..." maxlength="80">
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <div class="toolbar">
    <button class="priority-btn active-low" data-p="low" onclick="selectPriority('low')">Low</button>
    <button class="priority-btn" data-p="mid" onclick="selectPriority('mid')">Mid</button>
    <button class="priority-btn" data-p="high" onclick="selectPriority('high')">High</button>
    <div class="time-pill">
      <label style="font-size: 0.7rem; color: var(--text-3)">at</label>
      <input type="time" id="time-input">
    </div>
  </div>

  <div class="kbd-strip">
    <kbd>Enter</kbd> add &nbsp;·&nbsp; <kbd>Alt 1/2/3</kbd> priority &nbsp;·&nbsp; <kbd>Dbl-Click</kbd> edit
  </div>

  <div class="filters">
    <button class="filter-btn active" data-f="all" onclick="setFilter('all')">All <span id="cnt-all"></span></button>
    <button class="filter-btn" data-f="active" onclick="setFilter('active')">Active <span id="cnt-active"></span></button>
    <button class="filter-btn" data-f="done" onclick="setFilter('done')">Done <span id="cnt-done"></span></button>
  </div>

  <ul id="task-list"></ul>

  <div class="footer-row">
    <span class="task-counter" id="task-counter"></span>
    <div style="display:flex; gap:5px;">
      <button class="ghost-btn" id="clear-btn" onclick="clearDone()" style="display:none">Clear Done</button>
      <button class="ghost-btn" id="sort-btn" onclick="toggleSort()">Sort</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Task removed <button class="toast-undo" onclick="undoDelete()">Undo</button></div>

<script>
  let tasks = JSON.parse(localStorage.getItem('myDay_merged_tasks') || '[]');
  let selectedPriority = 'low';
  let activeFilter = 'all';
  let sortByPriority = false;
  let deletedTask = null;
  let deletedIndex = null;
  let toastTimer = null;

  const save = () => localStorage.setItem('myDay_merged_tasks', JSON.stringify(tasks));

  function selectPriority(p) {
    selectedPriority = p;
    document.querySelectorAll('.priority-btn').forEach(btn => {
      btn.className = 'priority-btn' + (btn.dataset.p === p ? ' active-' + p : '');
    });
  }

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.f === f));
    render();
  }

  function toggleSort() {
    sortByPriority = !sortByPriority;
    document.getElementById('sort-btn').classList.toggle('active', sortByPriority);
    render();
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const timeInput = document.getElementById('time-input');
    if (!input.value.trim()) return;
    tasks.push({ 
      id: Date.now(), 
      text: input.value.trim(), 
      priority: selectedPriority, 
      time: timeInput.value || null, 
      done: false 
    });
    input.value = '';
    timeInput.value = '';
    save(); render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id, e) {
    e.stopPropagation();
    const idx = tasks.findIndex(t => t.id === id);
    deletedTask = tasks[idx];
    deletedIndex = idx;
    tasks.splice(idx, 1);
    save(); render();
    showToast();
  }

  function showToast() {
    clearTimeout(toastTimer);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
  }

  function undoDelete() {
    if (deletedTask) {
      tasks.splice(deletedIndex, 0, deletedTask);
      deletedTask = null;
      save(); render();
      document.getElementById('toast').classList.remove('show');
    }
  }

  function clearDone() { tasks = tasks.filter(t => !t.done); save(); render(); }

  function render() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    
    let filtered = [...tasks];
    if (activeFilter === 'active') filtered = filtered.filter(t => !t.done);
    if (activeFilter === 'done') filtered = filtered.filter(t => t.done);
    if (sortByPriority) {
      const order = { high: 0, mid: 1, low: 2 };
      filtered.sort((a,b) => order[a.priority] - order[b.priority]);
    }

    // Counters
    const doneCount = tasks.filter(t => t.done).length;
    document.getElementById('cnt-all').textContent = `(${tasks.length})`;
    document.getElementById('cnt-active').textContent = `(${tasks.length - doneCount})`;
    document.getElementById('cnt-done').textContent = `(${doneCount})`;
    document.getElementById('clear-btn').style.display = doneCount > 0 ? 'block' : 'none';
    document.getElementById('task-counter').textContent = tasks.length ? `${tasks.length - doneCount} left` : '';

    filtered.forEach(task => {
      const li = document.createElement('li');
      li.className = task.done ? 'done' : '';
      li.dataset.id = task.id;

      const check = document.createElement('div');
      check.className = 'check-circle';
      check.onclick = (e) => { e.stopPropagation(); toggleTask(task.id); };

      const dot = document.createElement('div');
      dot.className = `p-dot ${task.priority}`;

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = task.text;

      // Merged Double-Click to Edit Feature
      span.ondblclick = (e) => {
        e.stopPropagation();
        const edit = document.createElement('input');
        edit.className = 'edit-input';
        edit.value = task.text;
        li.replaceChild(edit, span);
        edit.focus();
        
        const finishEdit = () => {
          if (edit.value.trim()) {
            task.text = edit.value.trim();
            save(); render();
          } else {
            li.replaceChild(span, edit);
          }
        };

        edit.onblur = finishEdit;
        edit.onkeydown = (e) => { if(e.key === 'Enter') finishEdit(); if(e.key === 'Escape') render(); };
      };

      const timeSpan = document.createElement('span');
      timeSpan.className = 'task-counter';
      timeSpan.style.marginRight = '8px';
      timeSpan.textContent = task.time || '';

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.innerHTML = '✕';
      del.onclick = (e) => deleteTask(task.id, e);

      li.append(check, dot, span, timeSpan, del);
      list.appendChild(li);
    });
  }

  // Utilities
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours() % 12 || 12).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock-time').textContent = `${h}:${m}:${s} ${now.getHours() >= 12 ? 'PM' : 'AM'}`;
    document.getElementById('seconds-bar').style.width = (now.getSeconds() / 60 * 100) + '%';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.id === 'task-input') addTask();
    if (e.altKey && e.key === '1') selectPriority('low');
    if (e.altKey && e.key === '2') selectPriority('mid');
    if (e.altKey && e.key === '3') selectPriority('high');
  });

  document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  setInterval(updateClock, 1000);
  updateClock();
  render();
</script>
</body>
</html>
